<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Typing — 你好！</title>
    <style>
      :root {
        --ok: #16a34a;
        --bad: #dc2626;
        --fg: #111827;
        --muted: #6b7280;
        --bg: #ffffff;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--fg);
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial,
          "Noto Sans", "Apple Color Emoji", "Segoe UI Emoji";
      }

      .card {
        width: min(560px, calc(100vw - 32px));
        padding: 28px;
        border: 1px solid #e5e7eb;
        border-radius: 14px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
      }

      .prompt {
        font-size: 56px;
        font-weight: 700;
        letter-spacing: 0.02em;
        text-align: center;
        margin: 0 0 18px;
      }

      .row {
        display: flex;
        align-items: center;
        gap: 10px;
        justify-content: center;
      }

      input[type="text"] {
        font-size: 40px;
        padding: 10px 14px;
        border: 2px solid #e5e7eb;
        border-radius: 12px;
        outline: none;
        width: 9ch;
        text-align: center;
        transition: border-color 120ms ease, color 120ms ease;
      }

      input[type="text"]:focus {
        border-color: #93c5fd;
      }

      input.bad {
        color: var(--bad);
        border-color: rgba(220, 38, 38, 0.55);
      }

      input.good {
        color: var(--fg);
        border-color: rgba(22, 163, 74, 0.55);
      }

      .check {
        font-size: 34px;
        line-height: 1;
        color: var(--ok);
        visibility: hidden;
        user-select: none;
      }

      .check.visible {
        visibility: visible;
      }

      .hint {
        margin-top: 12px;
        text-align: center;
        color: var(--muted);
        font-size: 14px;
      }

      .stack {
        display: grid;
        gap: 22px;
      }

      .card + .card {
        margin-top: 0;
      }

      /* Keep second card hidden until first is correct */
      .card.is-locked {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="stack">
      <main class="card" aria-label="Typing card 你好">
        <h1 class="prompt" aria-label="Prompt">你好！</h1>

        <div class="row">
          <label
            for="hanzi"
            class="sr-only"
            style="position: absolute; left: -9999px"
            >Type 你好！</label
          >
          <input
            id="hanzi"
            type="text"
            inputmode="text"
            autocomplete="off"
            autocapitalize="off"
            autocorrect="off"
            spellcheck="false"
            aria-describedby="hint"
          />
          <span
            id="check"
            class="check"
            aria-label="Correct"
            title="Correct"
            >✓</span
          >
        </div>

        <div id="hint" class="hint">
          Type the Simplified Chinese characters exactly: 你好！
        </div>
      </main>

      <main class="card is-locked" id="card2" aria-label="Typing card 我叫">
        <h1 class="prompt" aria-label="Prompt">我叫 (name)。</h1>

        <div class="row">
          <label
            for="intro"
            class="sr-only"
            style="position: absolute; left: -9999px"
            >Type 我叫…。</label
          >
          <input
            id="intro"
            type="text"
            inputmode="text"
            autocomplete="off"
            autocapitalize="off"
            autocorrect="off"
            spellcheck="false"
            aria-describedby="hint2"
          />
          <span
            id="check2"
            class="check"
            aria-label="Correct"
            title="Correct"
            >✓</span
          >
        </div>

        <div id="hint2" class="hint">
          Type: 我叫 + your name + 。 (parentheses not included)
        </div>
      </main>
    </div>

    <script>
      (function () {
        const input1 = document.getElementById("hanzi");
        const check1 = document.getElementById("check");
        const target1 = "你好！";

        const card2 = document.getElementById("card2");
        const input2 = document.getElementById("intro");
        const check2 = document.getElementById("check2");

        // Allow either "我叫名字。" or "我叫 名字。" (flexible space)
        // Require at least one character for the name, disallow parentheses in the typed name.
        const introRe = /^我叫\s*[^()（）]+。$/;

        // Disable copy/paste/cut and context menu (best-effort) for both inputs.
        const prevent = (e) => {
          e.preventDefault();
          return false;
        };

        [input1, input2].forEach((input) => {
          ["copy", "paste", "cut", "contextmenu"].forEach((evt) =>
            input.addEventListener(evt, prevent)
          );

          // Prevent Ctrl/Cmd+C/V/X.
          input.addEventListener("keydown", (e) => {
            const key = (e.key || "").toLowerCase();
            const isMod = e.ctrlKey || e.metaKey;
            if (isMod && (key === "c" || key === "v" || key === "x")) {
              e.preventDefault();
            }
          });
        });

        function unlockCard2() {
          if (!card2) return;
          if (!card2.classList.contains("is-locked")) return;

          card2.classList.remove("is-locked");

          // After DOM paints, focus the second input.
          requestAnimationFrame(() => input2.focus());
        }

        function update1() {
          const value = input1.value;
          const ok = value === target1;

          input1.classList.toggle("good", ok);
          input1.classList.toggle("bad", value.length > 0 && !ok);
          check1.classList.toggle("visible", ok);

          if (ok) unlockCard2();
        }

        function update2() {
          const value = input2.value;
          const ok = introRe.test(value);

          input2.classList.toggle("good", ok);
          input2.classList.toggle("bad", value.length > 0 && !ok);
          check2.classList.toggle("visible", ok);
        }

        input1.addEventListener("input", update1);
        input2.addEventListener("input", update2);
        update1();
        update2();

        // Focus first input on load for convenience.
        window.addEventListener("load", () => input1.focus());
      })();
    </script>
  </body>
</html>
